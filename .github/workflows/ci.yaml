name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: #[main]
env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CI_BUILD_NUMBER: ${{ github.run_number }}
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code 
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with: 
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:CiBuildNumber=$CI_BUILD_NUMBER

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal